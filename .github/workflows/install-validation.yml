name: Install Validation

on:
  push:
  pull_request:

jobs:
  validate-install:
    name: Validate no-admin agent install
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate installer and agent manifests
        shell: pwsh
        run: ./tests/install-validation.ps1

      - name: Validate mongoose CLI
        shell: pwsh
        run: ./tests/mongoose-validation.ps1

      - name: Validate mongoose local state
        shell: pwsh
        run: python ./tests/mongoose-state-validation.py

      - name: Validate mongoose runtime observability
        shell: pwsh
        run: python ./tests/mongoose-runtime-observability-validation.py

      - name: Validate release version metadata
        shell: pwsh
        run: python ./tests/release-version-validation.py

      - name: Validate terminal output formatting
        shell: pwsh
        run: python ./tests/terminal-output-validation.py

      - name: Validate YNAB read API foundation
        shell: pwsh
        run: python ./tests/ynab-api-validation.py

      - name: Validate YNAB config handling
        shell: pwsh
        run: python ./tests/njord-config-validation.py

      - name: Validate Njord snapshot model
        shell: pwsh
        run: python ./tests/njord-snapshot-validation.py
