name: Mongoose Build

on:
  pull_request:
    branches:
      - main
      - "release/v*"
  push:
    branches:
      - main
      - "release/v*"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mongoose:
    name: Build mongoose.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up MSYS2 GCC
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc
          path-type: inherit

      - name: Add GCC to PATH
        shell: pwsh
        run: echo "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Validate release version metadata
        shell: pwsh
        run: python ./tests/release-version-validation.py

      - name: Build mongoose.exe
        shell: cmd
        run: build-mongoose.cmd

      - name: Smoke test mongoose.exe help
        shell: pwsh
        run: |
          $env:LOCALAPPDATA = Join-Path $pwd ".test-localappdata-exe"
          if (Test-Path $env:LOCALAPPDATA) {
            Remove-Item $env:LOCALAPPDATA -Recurse -Force
          }
          .\dist\mongoose.exe --help
          $bootstrappedCli = Join-Path $env:LOCALAPPDATA "Agents\mongoose\mongoose.py"
          if (-not (Test-Path $bootstrappedCli)) {
            throw "mongoose.exe did not bootstrap mongoose.py"
          }

      - name: Upload mongoose.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: mongoose-exe
          path: dist/mongoose.exe
          if-no-files-found: error

      - name: Attach mongoose.exe to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mongoose.exe

